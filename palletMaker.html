<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    
    <link rel="stylesheet" href="resources/css/style.css">
</head>
<body>

    <div class="makerWrapper">
        <div class="filter">
            <form id="fitlerForm">
                <div>
                   <label for="name">Seach for name</label> 
                   <input type="text" name="name" id="name" placeholder="Search">
                </div>

                <div id="colors">
                    <label for="color">Chose color:</label>
                    <select name="color" id="color">
                        <option>Chose color</option>
                    </select>
                </div>

                <div id="category">
                    <label for="chateogry">Chose chategory</label>
                </div>
                <div>
                    <label for="sort">Chose sort filter</label>
                    <select name="sort" id="sort">
                    </select>
                </div>
            </form>
        </div>
        <div id="popUp">
            <div id="palletPicker">
                <h2>Chose the pallet to add block to:</h2>
                <div id="palletsWrap">
                    <div id="createPallet">
                        <div>
                            <label for="palletName">Name: </label>
                            <input type="text" name="palletName" id="palletName" autocomplete="off"></input>
                            <button class="createCancle" id="create">Create</button>
                            <button class="createCancle" id="cancle">Cancle</button>
                        </div>
                        <p id="error"></p>
                    </div>
                    <div class="palletsHeader">
                        <h3>Pallets:</h3>
                        <div>
                            
                            <i class="fa-solid fa-plus" id="addPallet"></i>
                        </div>
                    </div>
                    <div id="pallets">
                        
                    </div>
                    <button id="closePallets">Done</button>
                    <button id="clearPallets">Clear pallets</button>
                </div>

            </div>
        </div>
        <div class="catalog">
            <div class="page"></div>
            <div class="pages">
            </div>
        </div>

    </div>


    

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" 
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" 
    crossorigin="anonymous"></script>
    <script src="resources/js/main.js"></script>
</body>
</html>
